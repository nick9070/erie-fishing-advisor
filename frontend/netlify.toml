[build]
  command   = "npm run build"
  publish   = "dist"

# Proxy all /api/* calls to the Render backend — must come before the SPA catch-all
[[redirects]]
  from   = "/api/*"
  to     = "https://erie-fishing-advisor.onrender.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
